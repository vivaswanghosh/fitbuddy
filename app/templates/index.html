<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitBuddy - Your AI Fitness Companion</title>
    <link rel="stylesheet" href="../static/dist/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
</head>

<body class="gym-themed-bg">
    <div class="min-h-screen flex items-center justify-center px-4 py-8">
        <div class="w-full max-w-md">
            <!-- Header -->
            <div class="text-center mb-8">
                <h1 class="text-5xl font-black text-orange-500 mb-2 drop-shadow-lg">FITBUDDY</h1>
                <p class="text-gray-300 text-lg font-semibold">Your AI-Powered Fitness Companion</p>
                <div class="h-1 w-24 bg-gradient-to-r from-orange-500 to-red-600 mx-auto mt-4 rounded-full"></div>
            </div>

            <!-- Main Form Card -->
            <div class="bg-gray-900 shadow-2xl rounded-xl p-8 border-l-4 border-orange-500">
                <form method="POST" action="/generate-plan" class="space-y-6">
                    <!-- Username -->
                    <div>
                        <label for="username" class="form-label">Username</label>
                        <input type="text" id="username" name="username" placeholder="Enter your username" required
                            class="form-input" />
                    </div>

                    <!-- User ID -->
                    <div>
                        <label for="user_id" class="form-label">User ID</label>
                        <input type="number" id="user_id" name="user_id" placeholder="Your unique ID" required
                            class="form-input" />
                    </div>

                    <!-- Age -->
                    <div>
                        <label for="age" class="form-label">Age</label>
                        <input type="number" id="age" name="age" min="1" max="120" placeholder="Enter your age" required
                            class="form-input" />
                    </div>

                    <!-- Weight -->
                    <div>
                        <label for="weight" class="form-label">Weight (kg)</label>
                        <input type="number" id="weight" name="weight" step="0.1" placeholder="Your weight in kilograms"
                            required class="form-input" />
                    </div>

                    <!-- Fitness Goal -->
                    <div>
                        <label for="goal" class="form-label">Fitness Goal</label>
                        <select id="goal" name="goal" required class="form-input">
                            <option value="">Select your goal</option>
                            <option value="weight_loss">Weight Loss</option>
                            <option value="muscle_gain">Muscle Gain</option>
                            <option value="endurance">Endurance</option>
                            <option value="flexibility">Flexibility</option>
                            <option value="general_fitness">General Fitness</option>
                        </select>
                    </div>

                    <!-- Intensity Level -->
                    <div>
                        <label for="intensity" class="form-label">Intensity Level</label>
                        <select id="intensity" name="intensity" required class="form-input">
                            <option value="">Select intensity</option>
                            <option value="beginner">Beginner</option>
                            <option value="intermediate">Intermediate</option>
                            <option value="advanced">Advanced</option>
                            <option value="elite">Elite</option>
                        </select>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" class="btn-submit mt-8">
                        Generate My Plan
                    </button>
                </form>

                <!-- Footer Note -->
                <p class="text-center text-gray-400 text-xs mt-6 pt-6 border-t border-gray-700">
                    Your personalized AI-generated workout plan awaits! 💪
                </p>
            </div>

            <!-- Responsive Spacing -->
            <div class="mt-8 text-center text-gray-500 text-sm">
                <p>© 2026 FitBuddy - Powered by AI</p>
            </div>
        </div>
    </div>
</body>

</html>
